<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tensai Note</title>
  <style>
    html, body, #app-root {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      background: #0b1223;
    }

    body, #app-root {
      min-height: 100vh;
    }

    #app-root {
      flex: 1;
    }
    
    /* Custom Scrollbar Styles */
    * {
      scrollbar-width: thin;
      scrollbar-color: #334155 #0f172a;
    }
    
    *::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }
    
    *::-webkit-scrollbar-track {
      background: #0f172a;
      border-radius: 6px;
    }
    
    *::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 6px;
      border: 2px solid #0f172a;
    }
    
    *::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    
    *::-webkit-scrollbar-thumb:active {
      background: #1e40af;
    }
    
    *::-webkit-scrollbar-corner {
      background: #0f172a;
    }
  </style>
</head>
<body>
  <div id="app-root"></div>
</body>
</html>
